<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinancIO - Gastos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Header-->
    <header class="header">
        <h1>FinancIO - Gastos</h1>        
    </header>

    <!-- Main -->
    <main class="form-page">
        <section class="card form-card">
            <h2 class="form-title">Registrar movimiento</h2>

            <form id="formGasto" novalidate>
                <!-- MONTO -->
                <div class="form-group">
                    <label for="monto">Monto</label>
                    <input 
                        type="number" 
                        id="monto" 
                        name="monto"
                        placeholder="Ej: 250"
                        required
                        min="0.01"
                        step="0.01"
                    >
                    <small class="error-message"></small>
                </div>

                <!-- CATEGORIA -->
                <div class="form-group">
                    <label for="categoria">Categor&iacute;a</label>
                    <select id="categoria" required>
                        <option value="">Selecciona una categor&iacute;a</option>
                        <option>Comida</option>
                        <option>Transporte</option>
                        <option>Entretenimieto</option>
                        <option>Salud</option>
                        <option>Otro</option>
                    </select>
                    <small class="error-message"></small>
                </div>

                <!-- FECHA -->
                <div class="form-group">
                    <label for="fecha">Fecha</label>
                    <input type="date" id="fecha" required>
                    <small class="error-message"></small>
                </div>

                <!-- TIPO -->
                <div class="form-group">
                    <label>Tipo</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="tipo" value="gasto" checked>
                            Gasto
                        </label>
                        <label>
                            <input type="radio" name="tipo" value="ingreso">
                            Ingreso
                        </label>
                    </div>
                </div>

                <!-- DESCRIPCION -->
                <div class="form-group">
                    <label for="descripcion">Descripci&oacute;n</label>
                    <input 
                        type="text" 
                        id="descripcion"
                        placeholder="Ej: Comida en restaurante"
                    >
                </div>

                <!-- BOTON -->
                <button type="submit" class="btn-primary">
                    Guardar
                </button>

            </form>
        </section>

    </main>
</body>
</html>
